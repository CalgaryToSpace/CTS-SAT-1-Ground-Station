[project]
name = "cts1_mo_tools"
version = "0.1.0"
description = "Mission Operations tools for CTS-SAT-1."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "tyro",
    "polars",
    "ordered-set",
]

[project.scripts]
cts1_decode_satnogs_packets = "cts1_mo_tools.cts1_decode_satnogs_packets:main"

[dependency-groups]
dev = [
    "ruff >= 0.8.1",
    "pytest >= 8.3.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cts1_mo_tools"]
