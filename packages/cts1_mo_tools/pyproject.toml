[project]
name = "cts1_mo_tools"
version = "0.1.0"
description = "Mission Operations tools for CTS-SAT-1."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "tyro",
    "polars",
    "loguru",
    "ordered-set",
    "dearpygui",
    "requests",
    "python-dotenv",
    "reverse-geocoder>=1.5.1",
    "pycountry>=26.2.16",
]

[project.scripts]
cts1_decode_satnogs_packets = "cts1_mo_tools.cts1_decode_satnogs_packets:main"
cts1_agenda_maker = "cts1_mo_tools.cts1_agenda_maker.main:main"
cts1_make_bulk_uplink_agenda = "cts1_mo_tools.cts1_make_bulk_uplink_agenda:main"

[dependency-groups]
dev = [
    "ruff >= 0.8.1",
    "pytest >= 8.3.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cts1_mo_tools"]
